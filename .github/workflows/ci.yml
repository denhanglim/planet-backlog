name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Python pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # test_known_recovery downloads real TESS data from MAST and is excluded
      # from CI (network-dependent, ~minutes). Run it locally to verify recovery.
      - name: Run tests
        run: |
          pytest tests/ -q \
            --deselect tests/test_known_recovery.py::test_pipeline_recovers_pi_men_c

  web-build:
    name: Web static export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
